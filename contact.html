<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Asset Kerala</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {font-family:'Poppins',sans-serif;background:#f7f8fa;margin:0;}

.container {
  max-width:500px;
  margin:50px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">
<h2>Enquire Now</h2>

<form action="https://formsubmit.co/YOUR-EMAIL-HERE" method="POST">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="message" placeholder="Interested in which property?"></textarea>

<button type="submit">Send Enquiry</button>

</form>
</div>

</body>
</html>
